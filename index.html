<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機影片播放器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 20px; }
        .btn-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 12px 24px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            font-size: 16px;
        }
        .upload-btn { background-color: #007aff; }
        .fullscreen-btn { 
            background-color: #34c759; 
            display: none; /* 有影片時才顯示 */
        }
        input[type="file"] { display: none; }
        video {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: none;
        }
    </style>
</head>
<body>

    <h2>本地影片播放器</h2>
    
    <div class="btn-container">
        <label class="btn upload-btn" for="video-chooser">選擇手機裡的影片</label>
        <input type="file" id="video-chooser" accept="video/*">
        <button id="fullscreen-btn" class="btn fullscreen-btn">進入全螢幕</button>
    </div>

    <video id="video-player" controls></video>

    <script>
        const videoChooser = document.getElementById('video-chooser');
        const videoPlayer = document.getElementById('video-player');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        videoChooser.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                videoPlayer.src = fileURL;
                videoPlayer.style.display = 'block';
                fullscreenBtn.style.display = 'inline-block'; // 顯示全螢幕按鈕
                
                videoPlayer.play().catch(err => console.log("等待手動播放"));
            }
        });

        // 點擊自訂按鈕觸發全螢幕
        fullscreenBtn.addEventListener('click', function() {
            if (videoPlayer.requestFullscreen) {
                videoPlayer.requestFullscreen();
            } else if (videoPlayer.webkitEnterFullscreen) {
                // iOS Safari 專用的全螢幕方法
                videoPlayer.webkitEnterFullscreen();
            } else if (videoPlayer.mozRequestFullScreen) {
                videoPlayer.mozRequestFullScreen();
            } else if (videoPlayer.msRequestFullscreen) {
                videoPlayer.msRequestFullscreen();
            }
        });
    </script>
</body>
</html>
