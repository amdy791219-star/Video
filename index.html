<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超大影片播放器 (2.45G+ 拖動進度條修正版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 10px; text-align: center; }
        .sub-title { font-size: 13px; color: #aaa; margin-bottom: 20px; text-align: center; }
        .btn-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .btn {
            padding: 12px 20px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            font-size: 15px;
            transition: background 0.2s;
        }
        .upload-btn { background-color: #007aff; }
        .fullscreen-btn { background-color: #34c759; display: none; }
        .clear-btn { background-color: #ff3b30; display: none; }
        
        input[type="file"] { display: none; }
        
        video {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: none;
            margin-top: 10px;
        }

        #loading-msg {
            display: none;
            color: #ffd60a;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>本地大檔案播放器 (2.45GB 優化版)</h2>
    <div class="sub-title">已加入長影片 Fast-Seek 與記憶體緩衝優化</div>
    
    <div class="btn-container">
        <label class="btn upload-btn" for="video-chooser">選擇大容量影片</label>
        <input type="file" id="video-chooser" accept="video/*">
        
        <button id="fullscreen-btn" class="btn fullscreen-btn">進入全螢幕</button>
        <button id="clear-btn" class="btn clear-btn">看完清空(釋放容量)</button>
    </div>

    <div id="loading-msg">正在為超大影片建立緩衝索引，請稍候...</div>
    <video id="video-player" controls playsinline preload="metadata"></video>

    <script>
        const videoChooser = document.getElementById('video-chooser');
        const videoPlayer = document.getElementById('video-player');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const clearBtn = document.getElementById('clear-btn');
        const loadingMsg = document.getElementById('loading-msg');
        
        let currentObjectURL = null;
        let isSeeking = false;

        // 清理記憶體
        function releaseVideoMemory() {
            if (videoPlayer) {
                videoPlayer.pause();
                
                if (currentObjectURL) {
                    URL.revokeObjectURL(currentObjectURL);
                    currentObjectURL = null;
                }
                
                videoPlayer.src = ''; 
                videoPlayer.removeAttribute('src');
                videoPlayer.load(); 
            }
        }

        videoChooser.addEventListener('change', function(event) {
            const file = event.target.files[0];
            
            if (file) {
                releaseVideoMemory();
                loadingMsg.style.display = 'block';
                
                // 針對 2.45G 這種超大檔案使用特殊載入流程
                currentObjectURL = URL.revokeObjectURL(file); // 確保釋放舊的
                currentObjectURL = URL.createObjectURL(file);
                
                // preload="metadata" 讓瀏覽器只讀取頭部的時間長度，不要一次載滿全檔
                videoPlayer.preload = "metadata";
                videoPlayer.src = currentObjectURL;
                
                videoPlayer.style.display = 'block';
                fullscreenBtn.style.display = 'inline-block';
                clearBtn.style.display = 'inline-block';
                
                videoPlayer.onloadedmetadata = function() {
                    loadingMsg.style.display = 'none';
                    console.log("元數據載入成功，影片時長：", videoPlayer.duration);
                };
            }
        });

        // 解決「拉進度條卡死」的核心優化：
        // 當使用者開始拖拖動進度條 (seeking) 時，暫停影片避免緩衝區衝突
        videoPlayer.addEventListener('seeking', () => {
            if (!isSeeking) {
                isSeeking = true;
                loadingMsg.innerText = "正在拉取對應時間點畫面...";
                loadingMsg.style.display = 'block';
            }
        });

        // 拖放完成 (seeked) 後再恢復
        videoPlayer.addEventListener('seeked', () => {
            isSeeking = false;
            loadingMsg.style.display = 'none';
        });

        // 點擊「進入全螢幕」
        fullscreenBtn.addEventListener('click', function() {
            if (videoPlayer.webkitEnterFullscreen) {
                videoPlayer.webkitEnterFullscreen();
            } else if (videoPlayer.requestFullscreen) {
                videoPlayer.requestFullscreen();
            }
        });

        // 點擊「看完清空」
        clearBtn.addEventListener('click', function() {
            releaseVideoMemory();
            videoPlayer.style.display = 'none';
            fullscreenBtn.style.display = 'none';
            clearBtn.style.display = 'none';
            loadingMsg.style.display = 'none';
            videoChooser.value = ''; 
            alert('記憶體與快取已徹底釋放！');
        });

        window.addEventListener('beforeunload', releaseVideoMemory);
    </script>
</body>
</html>
