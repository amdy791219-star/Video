<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高效能影片播放器 (修正版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 20px; }
        .btn-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .btn {
            padding: 12px 20px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            font-size: 15px;
            transition: background 0.2s;
        }
        .upload-btn { background-color: #007aff; }
        .fullscreen-btn { background-color: #34c759; display: none; }
        .clear-btn { background-color: #ff3b30; display: none; }
        
        input[type="file"] { display: none; }
        
        video {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>本地影片播放器 (Safari 優化版)</h2>
    
    <div class="btn-container">
        <label class="btn upload-btn" for="video-chooser">選擇手機影片</label>
        <input type="file" id="video-chooser" accept="video/*">
        
        <button id="fullscreen-btn" class="btn fullscreen-btn">進入全螢幕</button>
        <button id="clear-btn" class="btn clear-btn">看完清空(釋放容量)</button>
    </div>

    <video id="video-player" controls playsinline preload="metadata"></video>

    <script>
        const videoChooser = document.getElementById('video-chooser');
        const videoPlayer = document.getElementById('video-player');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const clearBtn = document.getElementById('clear-btn');
        let currentObjectURL = null;

        // 核心：徹底釋放記憶體
        function releaseVideoMemory() {
            if (videoPlayer) {
                videoPlayer.pause();
                
                // 1. 強制撤銷 Blob URL，這步最關鍵
                if (currentObjectURL) {
                    URL.revokeObjectURL(currentObjectURL);
                    currentObjectURL = null;
                    console.log('【系統】Blob URL 已銷毀');
                }
                
                // 2. 徹底清空 video 標籤的來源，強迫 Safari 釋放 Buffer
                videoPlayer.src = ''; 
                videoPlayer.removeAttribute('src');
                
                // 3. 重新載入空內容，清空底層解碼器記憶體
                videoPlayer.load(); 
            }
        }

        // 當使用者選擇影片時
        videoChooser.addEventListener('change', function(event) {
            const file = event.target.files[0];
            
            if (file) {
                // 先清理舊的
                releaseVideoMemory();
                
                // 檢查檔案大小，如果是大檔案（例如大於 500MB），給予提示
                if (file.size > 500 * 1024 * 1024) {
                    console.warn("偵測到大檔案，Safari 處理可能會較慢");
                }
                
                // 建立新的 URL
                currentObjectURL = URL.createObjectURL(file);
                
                // 掛載新影片
                videoPlayer.src = currentObjectURL;
                videoPlayer.style.display = 'block';
                fullscreenBtn.style.display = 'inline-block';
                clearBtn.style.display = 'inline-block';
                
                // 讓影片準備就緒
                videoPlayer.load();
                
                // 嘗試播放
                videoPlayer.play().catch(err => console.log("等待手動點擊播放"));
            }
        });

        // 點擊「進入全螢幕」
        fullscreenBtn.addEventListener('click', function() {
            if (videoPlayer.webkitEnterFullscreen) {
                videoPlayer.webkitEnterFullscreen();
            } else if (videoPlayer.requestFullscreen) {
                videoPlayer.requestFullscreen();
            }
        });

        // 點擊「看完清空」
        clearBtn.addEventListener('click', function() {
            releaseVideoMemory();
            
            videoPlayer.style.display = 'none';
            fullscreenBtn.style.display = 'none';
            clearBtn.style.display = 'none';
            videoChooser.value = ''; 
            
            alert('快取與影片解碼記憶體已徹底釋放！');
        });

        // 額外保險：當分頁關閉或重新整理時，強制釋放
        window.addEventListener('beforeunload', releaseVideoMemory);
    </script>
</body>
</html>
