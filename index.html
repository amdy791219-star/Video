<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高效能影片播放器 (長影片優化版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 20px; }
        .btn-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .btn {
            padding: 12px 20px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            font-size: 15px;
            transition: background 0.2s;
        }
        .upload-btn { background-color: #007aff; }
        .fullscreen-btn { background-color: #34c759; display: none; }
        .clear-btn { background-color: #ff3b30; display: none; }
        
        input[type="file"] { display: none; }
        
        video {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>本地影片播放器 (長影片流暢優化版)</h2>
    
    <div class="btn-container">
        <label class="btn upload-btn" for="video-chooser">選擇手機影片</label>
        <input type="file" id="video-chooser" accept="video/*">
        
        <button id="fullscreen-btn" class="btn fullscreen-btn">進入全螢幕</button>
        <button id="clear-btn" class="btn clear-btn">看完清空(釋放容量)</button>
    </div>

    <!-- 優化：預設 preload="none"，防止長影片一開始就塞滿瀏覽器記憶體快取 -->
    <video id="video-player" controls playsinline preload="none"></video>

    <script>
        const videoChooser = document.getElementById('video-chooser');
        const videoPlayer = document.getElementById('video-player');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const clearBtn = document.getElementById('clear-btn');
        let currentObjectURL = null;

        // 核心：徹底釋放記憶體與影片 Buffer
        function releaseVideoMemory() {
            if (videoPlayer) {
                videoPlayer.pause();
                
                // 1. 強制撤銷 Blob URL
                if (currentObjectURL) {
                    URL.revokeObjectURL(currentObjectURL);
                    currentObjectURL = null;
                    console.log('【系統】Blob URL 已銷毀');
                }
                
                // 2. 徹底清空影片來源，強迫 Safari 釋放記憶體與緩衝區
                videoPlayer.src = ''; 
                videoPlayer.removeAttribute('src');
                
                // 3. 重新載入空內容，清空底層解碼器
                videoPlayer.load(); 
            }
        }

        // 當使用者選擇影片時
        videoChooser.addEventListener('change', function(event) {
            const file = event.target.files[0];
            
            if (file) {
                // 先清理舊的記憶體
                releaseVideoMemory();
                
                // 建立新的 Blob URL
                currentObjectURL = URL.createObjectURL(file);
                
                // 優化長影片載入策略
                videoPlayer.preload = "none"; // 避免貪婪預載 3 小時內容
                videoPlayer.src = currentObjectURL;
                
                videoPlayer.style.display = 'block';
                fullscreenBtn.style.display = 'inline-block';
                clearBtn.style.display = 'inline-block';
                
                // 嘗試播放，並捕捉非同步播放錯誤
                videoPlayer.play().catch(err => {
                    console.log("等待使用者手動點擊播放");
                });
            }
        });

        // 針對長影片的緩衝警告機制 (避免記憶體崩潰)
        videoPlayer.addEventListener('waiting', () => {
            console.warn('【提示】緩衝區讀取中，長影片快取壓迫中，請稍候...');
        });

        // 點擊「進入全螢幕」
        fullscreenBtn.addEventListener('click', function() {
            if (videoPlayer.webkitEnterFullscreen) {
                videoPlayer.webkitEnterFullscreen(); // 相容 Safari/iOS
            } else if (videoPlayer.requestFullscreen) {
                videoPlayer.requestFullscreen();
            }
        });

        // 點擊「看完清空」
        clearBtn.addEventListener('click', function() {
            releaseVideoMemory();
            
            videoPlayer.style.display = 'none';
            fullscreenBtn.style.display = 'none';
            clearBtn.style.display = 'none';
            videoChooser.value = ''; 
            
            alert('記憶體與影片快取已完全清理！');
        });

        // 當分頁關閉或重新整理時，強制釋放
        window.addEventListener('beforeunload', releaseVideoMemory);
    </script>
</body>
</html>
